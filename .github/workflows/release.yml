name: Build & Release

# Build installers for Windows, macOS, and Linux and attach them to a GitHub
# Release whenever a version tag (e.g. v1.0.0) is pushed.
on:
  push:
    tags: ['v*']
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install build tooling
        run: npm install

      - name: Build and publish installers
        run: npx electron-builder --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # We ship unsigned, so don't try to auto-discover a macOS signing identity.
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
